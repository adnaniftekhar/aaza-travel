<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Itinerary — AAZA Travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">AAZA Travels</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="vlogs.html">Vlogs</a>
        <a href="itinerary.html" class="active">Itinerary</a>
      </nav>
    </div>
  </header>

  <div class="page-main page-main--itinerary">
    <h1>Itinerary</h1>
    <p class="muted itinerary-route">Paris → Marseille → Toulouse → Bordeaux → Basque Country → Edinburgh → Sardinia → Tanzania</p>

    <div class="itinerary-layout">
      <div id="timeline" class="itinerary-timeline"></div>

      <aside class="itinerary-sidebar">
        <figure class="itinerary-photo">
          <img src="photos/itinerary.jpg" alt="Open road through the countryside on our family travels" width="400" height="260" loading="lazy">
          <figcaption>On the road — AAZA Adventures</figcaption>
        </figure>

        <div class="itinerary-map-wrap">
          <h2 class="itinerary-map-title">On the map</h2>
          <p id="map-label" class="muted itinerary-map-label"></p>
          <iframe
            id="itinerary-map"
            class="itinerary-map"
            title="Map of our current location"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </aside>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <p>&copy; 2026 AAZA Travel Adventures</p>
      <div id="footer-ig-links" class="ig-links"></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    renderItinerary("timeline", ITINERARY);
    renderItineraryMap(ITINERARY);
    renderInstagramLinks("footer-ig-links");
  </script>
</body>
</html>
