<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Follow the AAZA family on their year-long world schooling journey.">
  <title>AAZA Travel Adventures</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">AAZA Travels</a>
      <nav>
        <a href="index.html" class="active">Home</a>
        <a href="blog.html">Blog</a>
        <a href="colors.html">Colors</a>
        <a href="itinerary.html">Itinerary</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <h1 id="site-title"></h1>
      <p id="site-tagline"></p>
      <span class="hero-dates">June 30, 2026 — World Schooling Journey</span>
    </div>
  </section>

  <div id="where-banner" class="where-banner" hidden></div>

  <main>
    <section>
      <div class="section-header">
        <h2>Instagram</h2>
        <div id="ig-links" class="ig-links"></div>
      </div>
      <p class="hashtag-hint">
        Posts tagged with <code>#AAZATravels</code>, <code>#AAZAadventures</code>, and location tags like <code>#AAZAParis</code> appear here automatically.
      </p>
      <div id="feed" class="feed-grid" style="margin-top:1.25rem"></div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <p>&copy; 2026 AAZA Travel Adventures</p>
      <div id="footer-ig-links" class="ig-links"></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("site-title").textContent = FAMILY.name;
    document.getElementById("site-tagline").textContent = FAMILY.tagline;
    renderInstagramLinks("ig-links");
    renderInstagramLinks("footer-ig-links");
    renderWhereBanner("where-banner");
    loadInstagramFeed("feed");
  </script>
</body>
</html>
