name: Update Instagram Feed

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Instagram posts
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN_ADNAN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN_ADNAN }}
          INSTAGRAM_ACCESS_TOKEN_AMY: ${{ secrets.INSTAGRAM_ACCESS_TOKEN_AMY }}
          INSTAGRAM_USER_ID_ADNAN: ${{ secrets.INSTAGRAM_USER_ID_ADNAN }}
          INSTAGRAM_USER_ID_AMY: ${{ secrets.INSTAGRAM_USER_ID_AMY }}
          IG_SESSIONID: ${{ secrets.IG_SESSIONID }}
        run: node scripts/fetch-instagram.mjs

      - name: Commit feed if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/feed.json photos/feed/
          if git diff --staged --quiet; then
            echo "No changes to feed.json"
          else
            git commit -m "Update Instagram feed"
            git pull --rebase origin main
            git push
          fi
